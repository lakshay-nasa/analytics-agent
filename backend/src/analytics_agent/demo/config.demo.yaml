context_platforms:
  - type: datahub
    name: default
    label: "DataHub"
    url: "${DATAHUB_GMS_URL}"
    token: "${DATAHUB_GMS_TOKEN}"

engines:
  - type: mysql
    name: fiction_retail
    connection:
      dialect: mysql+pymysql
      host: "${MYSQL_HOST}"
      port: 3306
      user: "${MYSQL_USER}"
      password: "${MYSQL_PASSWORD}"
      database: "${MYSQL_DATABASE}"
